<html lang="de">

<head>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertrauensschüler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #eef2f7, #ffffff);
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        td, th {
            overflow: auto;
            border: 1px solid #ddd;
            padding: 8px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        nav a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #2c3e50;
            color: white;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .team-section {
            display: flex;
            gap: 20px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .team-image {
            width: 300px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .team-image {
            transition: transform 0.3s ease;
            /* sanfter Übergang */
        }

        .team-image:hover {
            transform: scale(1.1);
            /* 10% vergrößern beim Hover */
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #555;
        }

        @media (max-width: 700px) {
            .team-section {
                flex-direction: column;
                align-items: center;
            }

            .team-image {
                width: 100%;
                height: auto;
            }
        }

        .dark {
            background: #121212;
            color: white;
        }

        .dark .card {
            background: #1e1e1e;
            color: white;
        }

        .dark nav a {
            color: white;
        }

        .dark nav a:hover {
            background-color: white;
            color: black;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input,
        textarea {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 1em;
            width: 100%;
        }

        button {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #4ca1af;
        }

        #class {
            width: 100px;
            height: 30px;
            border: 2px solid #ccc;
            background-color: #ffffff;
            border-radius: 7px;
        }

        #name {
            border: 2px solid #ccc;
            background-color: #ffffff;
            border-radius: 7px;
            width: auto;
        }

        #problem {
            border: 2px solid #ccc;
            background-color: #ffffff;
            border-radius: 7px;
        }

        #pause {
            text-align: center;
            font-size: medium;
            height: 40px;
            border: 2px solid #ccc;
            background-color: #ffffff;
            border-radius: 7px;
        }

        #sendButton {
            background-color: #4caf4faf;
            color: white;
            border: none;
            height: 50px;
            width: 150px;
            padding: 10px 20px;
            border-radius: 7px;
            font-size: medium;
        }

        #sendButton:hover {
            background-color: #5dd661;
        }

        #sendButton:active {
            background-color: #7bca46;
            scale: calc(0.95);
        }

        #datenschutz {
            width: 20px;
            height: 20px;
        }

        #datenschutz:hover {
            cursor: pointer;
        }

        #datenschutz-label {
            height: 20px;
            font-size: 97%;
            color: #555;
            margin-left: 10px;
        }

        #check {
            display: flex;
            align-items: center;
        }
    </style>
    <style type="text/css"></style>
</head>

<body>

    <header>
        <h1>Vertrauensschüler</h1>
        <p>Wir sind für euch da!</p>
        <button onclick="toggleDarkMode()" style="
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  ">
            🌙
        </button>
    </header>

    <nav>
        <a href="index.html">Zurück zur Startseite</a>
    </nav>

    <div class="container">
        <div class="card" id="about" style="align-items: center; text-align: center;">
            <img style="height: 35pc; width: 50pc;" id="show" src="Pictures/Raum.jpg">
            <br>
            <h4 id="beschreibung">Unser Raum</h4>
            <button onclick="previous()">Zurück</button>
            <button onclick="next()">Weiter</button>
        </div>
    </div>
    <script>
        let pictures = ["Pictures/Raum.jpg", "Pictures/Weg.jpg", "Pictures/Team.png"]
        let texts = ["Unser Raum", "So kommst du zu uns", "Unser Team"]
        let pic = 0;

        function next(){
            pic += 1;
            document.getElementById("show").src = pictures[Math.abs(pic % pictures.length)]
            document.getElementById("beschreibung").innerHTML = texts[Math.abs(pic % pictures.length)]
        }

        function previous(){
            pic -= 1;
            document.getElementById("show").src = pictures[Math.abs(pic % pictures.length)]
            document.getElementById("beschreibung").innerHTML = texts[Math.abs(pic % pictures.length)]
        }
    </script>
</body>

</html>
